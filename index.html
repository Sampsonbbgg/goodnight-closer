<style>

.star.lg{width:3px;height:3px;background:rgba(212,197,169,.7);box-shadow:0 0 6px rgba(212,197,169,.4)}

@keyframes breathe{0%,100%{opacity:.6}50%{opacity:1}}

@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.08);opacity:1}}
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-3px) rotate(-2deg)}40%{transform:translateX(3px) rotate(2deg)}60%{transform:translateX(-2px) rotate(-1deg)}80%{transform:translateX(2px) rotate(1deg)}}

<script>
/* =============== CONFIG =============== */
const MODES={
  wheel:{n:'命运转盘',ic:'🎡',d:'让命运温柔地转动',cat:'random'},
  card:{n:'晚安抽卡',ic:'✨',d:'翻开今晚的那张牌',cat:'random'},
  fair:{n:'公平轮值',ic:'⚖️',d:'让公平守护想念',cat:'fair'},
  quiz:{n:'默契测试',ic:'💕',d:'今晚你有多懂我',cat:'sync'},
  dice:{n:'晚安骰子',ic:'🎲',d:'双骰落定温柔',cat:'random'},
  story:{n:'剧情签',ic:'📜',d:'抽一张今晚的故事',cat:'vibe'},
  task:{n:'心动任务',ic:'💌',d:'完成甜蜜小任务',cat:'task'},
  blindbox:{n:'晚安盲盒',ic:'🎁',d:'拆开今晚的惊喜',cat:'random'},
  startrail:{n:'星轨许愿',ic:'🌠',d:'星河中寻找答案',cat:'vibe'},
  countdown:{n:'默契倒数',ic:'⏱️',d:'用默契决定今晚',cat:'sync'},
};
const CATS=[{id:'all',n:'全部'},{id:'random',n:'随机'},{id:'sync',n:'默契'},{id:'vibe',n:'氛围'},{id:'fair',n:'公平'},{id:'task',n:'任务'}];

const DA=['立即收尾','说晚安暗号后收尾','飞吻后收尾','倒数5秒后收尾','交换最想说的话后收尾','晚安称呼后收尾'];

function rn(r){return r==='sampson'?'Sampson':'Sharyn'}

/* =============== STATE =============== */
const S={screen:'home',connected:false,rs:null,me:null,starting:false,result:null,anim:false,catF:'all',cdT:null,cdV:null,cdR:false,qc:null,modal:null,jid:'',loading:false,err:'',gh:null};
let sk;

/* =============== DOM =============== */
const $=s=>document.querySelector(s);
function genStars(){const c=$('#stars');let h='';for(let i=0;i<60;i++){const x=Math.random()*100,y=Math.random()*100,lg=Math.random()>.85;h+=`<div class="star${lg?' lg':''}" style="left:${x}%;top:${y}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*5}s"></div>`;}h+='<div class="moon-glow"></div><div class="btm-fade"></div>';c.innerHTML=h;}

/* =============== SOCKET =============== */
function initSk(){
  sk=io(location.origin,{transports:['websocket','polling'],reconnection:true,reconnectionAttempts:20,reconnectionDelay:1000,timeout:10000});
  sk.on('connect',()=>{S.connected=true;upd();
    sk.emit('get_history',(d)=>{if(d&&d.records){S.gh=d;if(S.screen==='history')rdr();}});
    const lh=localStorage.getItem('gc_h');
    if(lh){try{const arr=JSON.parse(lh);if(Array.isArray(arr)&&arr.length>0){sk.emit('migrate_history',{records:arr},(res)=>{if(res&&res.merged>=0)localStorage.removeItem('gc_h');});}}catch(e){}}
    const sr=sessionStorage.getItem('gc_r'),sl=sessionStorage.getItem('gc_l');if(sr&&sl){sk.emit('join_room',{roomId:sr,role:sl},(d)=>{if(d.success&&d.state){S.rs=d.state;S.me=sl;S.screen='room';rdr();}else{sessionStorage.removeItem('gc_r');sessionStorage.removeItem('gc_l');}});}});
  sk.on('disconnect',()=>{S.connected=false;upd();});
  sk.on('history_updated',(d)=>{if(d&&d.records){S.gh=d;if(S.screen==='history')rdr();}});
  sk.on('room_state',(st)=>{const op=S.rs?.phase,om=S.rs?.selectedMode;S.rs=st;if(st.phase==='result'&&st.result)S.result=st.result;const phChanged=op!==st.phase;const modeChanged=om!==st.selectedMode;if(phChanged){if(st.phase==='answering'&&st.selectedMode==='countdown')startCd();if(st.phase==='both_joined'){S.anim=false;S.starting=false;}}if(phChanged||modeChanged){if(S.anim&&st.phase==='result'){}else{rdr();}}else{upd();}});
  sk.on('game_starting',()=>{S.starting=true;S.result=null;S.anim=true;rdr();});
  sk.on('game_result',(d)=>{S.result=d.result;S.starting=false;S.anim=true;const m=S.rs?.selectedMode;rdr();setTimeout(()=>ardr(),50);const dl=m==='wheel'?4500:m==='dice'?4500:m==='card'?2500:m==='startrail'?3000:m==='blindbox'?2500:1800;setTimeout(()=>{S.anim=false;rdr();},dl);});
  sk.on('game_reset',()=>{S.starting=false;S.result=null;S.anim=false;S.qc=null;S.cdR=false;clrCd();upd();});
  sk.on('answers_revealed',()=>upd());
  sk.on('player_answered',()=>upd());
  sk.on('room_expired',()=>{S.rs=null;S.me=null;S.screen='home';sessionStorage.removeItem('gc_r');sessionStorage.removeItem('gc_l');rdr();});
}
function startCd(){clrCd();S.cdV=5;S.cdR=false;S.cdT=setInterval(()=>{S.cdV--;if(S.cdV<=0){clearInterval(S.cdT);S.cdT=null;S.cdR=true;}upd();},1000);}
function clrCd(){if(S.cdT){clearInterval(S.cdT);S.cdT=null;}S.cdV=null;S.cdR=false;}

/* =============== ACTIONS =============== */
function doCr(role){if(!S.connected)return;S.loading=true;S.err='';upd();sk.emit('create_room',(d)=>{sk.emit('join_room',{roomId:d.roomId,role},(r)=>{S.loading=false;if(r.success){S.rs=r.state;S.me=role;S.screen='room';S.modal=null;sessionStorage.setItem('gc_r',d.roomId);sessionStorage.setItem('gc_l',role);rdr();}else{S.err=r.error||'创建失败';upd();}});});}
function doJn(role){const id=S.jid.trim();if(!id){S.err='请输入房间号';upd();return;}S.loading=true;S.err='';upd();sk.emit('join_room',{roomId:id,role},(r)=>{S.loading=false;if(r.success){S.rs=r.state;S.me=role;S.screen='room';S.modal=null;sessionStorage.setItem('gc_r',id);sessionStorage.setItem('gc_l',role);rdr();}else{S.err=r.error||'加入失败';upd();}});}
function doSM(m){sk.emit('select_mode',{mode:m});}
function doRdy(){sk.emit('toggle_ready');}
function doSt(){sk.emit('start_game');}
function doAns(a){S.qc=a;sk.emit('submit_answer',{answer:a});upd();}
function doCdP(){sk.emit('countdown_press');}
function doRst(){S.qc=null;S.cdR=false;clrCd();sk.emit('reset_game');}
function doLv(){sk.emit('leave_room');S.rs=null;S.me=null;S.starting=false;S.result=null;S.anim=false;S.qc=null;clrCd();sessionStorage.removeItem('gc_r');sessionStorage.removeItem('gc_l');S.screen='home';rdr();}
function doShare(btn){
  const rid=S.rs?.id;if(!rid)return;
  const url=location.origin;
  const txt='今晚的晚安仪式已准备好～\n房间号：'+rid+'\n打开链接加入：'+url;
  if(navigator.share){navigator.share({title:'晚安收尾官',text:txt}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>{if(btn){btn.textContent='已复制';setTimeout(()=>{btn.textContent='分享'},1500);}}).catch(()=>{prompt('复制以下信息发给 Ta：',txt);});}
  else{prompt('复制以下信息发给 Ta：',txt);}
}

/* =============== RENDER =============== */
function rdr(){$('#app').innerHTML=S.screen==='home'?scrHome():S.screen==='room'?scrRoom():scrHist();ardr();}
function upd(){
  if(S.screen==='room'&&S.rs){
    const ph=S.rs.phase;
    const needsFull=!$('#pb')||!$('#ga')||(ph!=='waiting'&&ph!=='playing'&&ph!=='answering'&&ph!=='result'&&!$('#ms'));
    if(needsFull){rdr();return;}
    const pb=$('#pb');if(pb)pb.innerHTML=pbarI();
    const st=$('#st');if(st)st.innerHTML=stTxt();
    const ga=$('#ga');
    if(ga&&!S.anim){
      if(ph==='playing'||S.starting||S.anim||ph==='answering'||ph==='result'){ga.innerHTML=gaC();ardr();}
      else if(ph==='waiting'){ga.innerHTML=waitC();}
      else{ga.innerHTML=rdyA();}
    }
    const ms=$('#ms');
    if(ms&&!S.anim&&!S.starting&&!['playing','answering','result'].includes(ph))ms.innerHTML=msI();
    return;
  }
  rdr();
}
function ardr(){
  if(S.screen!=='room'||!S.rs)return;
  const m=S.rs.selectedMode;
  if(m==='wheel'){const c=$('#wcv');if(c)dW(c);if(S.result?.mode==='wheel'&&S.result.wheelIndex!==undefined&&S.anim)setTimeout(()=>{const c=$('#wcv');if(c)spW(c,S.result.wheelIndex);},100);}
  if(m==='card'&&S.result?.mode==='card'&&S.anim)setTimeout(()=>{const f=$('.finn');if(f)f.classList.add('flip');},800);
  if(m==='startrail'&&S.starting&&!S.result)setTimeout(aStars,200);
  if(m==='startrail'&&S.result?.mode==='startrail'&&S.anim)setTimeout(rStarC,2500);
  if(m==='blindbox'&&S.result?.mode==='blindbox'&&S.anim){const b=$('.bbox');const r=$('.brev');if(b){b.classList.add('shk');setTimeout(()=>{b.classList.remove('shk');b.classList.add('opn');if(r)r.classList.add('show');},1200);}}
  if(m==='dice'&&S.result?.mode==='dice'&&S.anim)setTimeout(()=>{document.querySelectorAll('.dbox').forEach(d=>d.classList.add('roll'));},600);
}

<div style="text-align:center;font-size:12px"><span style="color:var(--t5);margin-right:4px">房间</span><span style="font-family:monospace;letter-spacing:.15em;color:var(--t2)">${rs.id}</span></div>

function pbarI(){
  const rs=S.rs;if(!rs)return '';const me=S.me,ot=or(me);const mp=rs.players[me],op=rs.players[ot];
  function av(role,p,isMe){
    const on=p?.connected,rdy=p?.ready,ans=p?.answered,clr=role==='sampson'?'var(--cream)':'var(--rose)';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
<div class="pav card-s" style="border:2px solid ${on?(rdy?'rgba(110,231,183,.4)':'rgba(155,142,196,.25)'):'rgba(155,142,196,.1)'}${rdy?';box-shadow:0 0 12px rgba(110,231,183,.15)':''}">
<span style="color:${clr}">${rn(role)[0]}</span><span class="dot ${on?'dot-on':'dot-off'}"></span>${rdy?'<span class="chk">✓</span>':''}
</div>
<div style="text-align:center"><div class="pname" style="color:${clr}">${rn(role)}</div><div class="psub">${isMe?'(你)':''}${!on&&p?' · 离线':''}${ans&&!isMe?' · 已作答':''}</div></div>
</div>`;}
  const bon=mp?.connected&&op?.connected;
  return `${av(me,mp,true)}<div class="plink"><div class="pline">${bon?'<div class="ldot"></div>':''}</div><span style="font-size:10px;color:var(--t6);opacity:.5">${bon?'同处一个夜晚':'等待连接...'}</span></div>${av(ot,op,false)}`;}

function stTxt(){
  const rs=S.rs;if(!rs||!S.me)return '';const me=S.me,ot=or(me),op=rs.players[ot],mp=rs.players[me];
  if(op&&!op.connected)return `${rn(ot)} 暂时离开了，等${ot==='sharyn'?'她':'他'}回来`;
  if(rs.phase==='waiting')return '等待另一半加入这个夜晚...';
  if(rs.phase==='both_joined'&&!rs.selectedMode)return '选择一种方式，让今晚的收尾变得温柔';
  if(rs.phase==='mode_selecting'){
    if(!mp?.ready&&!op?.ready)return rs.modeSelectedBy&&rs.modeSelectedBy!==me?`${rn(rs.modeSelectedBy)} 选择了 ${MODES[rs.selectedMode]?.n||''}，请点击准备`:'选好模式后，点击准备';
    if(mp?.ready&&!op?.ready)return `等待 ${rn(ot)} 准备好...`;
    if(!mp?.ready&&op?.ready)return `${rn(ot)} 已准备好了，在等你`;}
  if(rs.phase==='both_ready')return '双方已就绪，可以开始今晚的仪式';
  if(rs.phase==='playing'||S.starting)return '仪式正在慢慢揭晓...';
  if(rs.phase==='answering'){if(rs.selectedMode==='quiz')return '请各自选择你的答案';if(rs.selectedMode==='countdown')return S.cdR?'同时按下！':'准备...';}
  return '';}

function rdyA(){
  const rs=S.rs;if(!rs||!rs.selectedMode)return '';const me=S.me,ot=or(me),mr=rs.players[me]?.ready,otr=rs.players[ot]?.ready,br=mr&&otr;

</div>`;}

/* =============== GAME AREA =============== */
function gaC(){
  const rs=S.rs;if(!rs)return '';const m=rs.selectedMode,ph=rs.phase;
  if(ph==='answering'){if(m==='quiz')return gQuiz();if(m==='countdown')return gCd();}
  if(ph==='result'&&S.result&&!S.anim)return resC();
  if(S.starting||S.anim||ph==='playing'){
    switch(m){
      case 'wheel':return gWheel();case 'card':return gCard();case 'dice':return gDice();
      case 'blindbox':return gBlind();case 'startrail':return gStar();case 'story':return gStory();
      case 'task':return gTask();case 'fair':return gFair();default:return '<div class="gtit">仪式进行中...</div>';}
  }return '';}

/* WHEEL */
function gWheel(){return `<div class="gtit">${S.result?'命运已经决定...':'命运转盘即将转动'}</div><div class="wwrap"><div class="wptr"></div><canvas id="wcv" width="520" height="520" class="wcv"></canvas></div>`;}
function dW(cv){
  const ctx=cv.getContext('2d');const s=260,dp=2;cv.width=s*dp;cv.height=s*dp;cv.style.width=s+'px';cv.style.height=s+'px';ctx.scale(dp,dp);
  const cx=s/2,cy=s/2,r=s/2-4,n=WS.length,sa=360/n;
  for(let i=0;i<n;i++){const a1=(i*sa-90)*Math.PI/180,a2=((i+1)*sa-90)*Math.PI/180;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,a1,a2);ctx.closePath();ctx.fillStyle=WS[i].c;ctx.fill();ctx.strokeStyle='rgba(155,142,196,.3)';ctx.lineWidth=1;ctx.stroke();ctx.save();ctx.translate(cx,cy);ctx.rotate(a1+(a2-a1)/2);ctx.fillStyle='rgba(240,234,245,.85)';ctx.font='11px "Noto Sans SC",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';const ls=WS[i].t.split('\n'),lh=14,sy=r*.55-((ls.length-1)*lh)/2;ls.forEach((l,j)=>ctx.fillText(l,0,sy+j*lh));ctx.restore();}
  ctx.beginPath();ctx.arc(cx,cy,26,0,Math.PI*2);ctx.fillStyle='rgba(21,16,32,.9)';ctx.fill();ctx.strokeStyle='rgba(155,142,196,.4)';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='rgba(212,197,169,.8)';ctx.font='12px "Noto Serif SC",serif';ctx.textAlign='center';ctx.fillText('命运',cx,cy-6);ctx.fillText('转盘',cx,cy+8);}
function spW(cv,idx){const sa=360/WS.length;cv.style.transform=`rotate(${5*360-(idx*sa+sa/2)+(Math.random()*10-5)}deg)`;}

function exportCsv(){
  const records=S.gh?.records||[];
  if(!records.length){alert('暂无记录可导出');return;}
  const header=['日期','收尾人','模式','描述','额外任务','加时(分钟)','防连挂'];
  const rows=records.map(e=>{const r=e.result||{};const md=MODES[r.mode];return [e.date||'',rn(r.closer),md?.n||r.mode||'',csvEsc(r.desc||''),csvEsc(r.extraTask||''),r.extraMinutes||'',r.antiStreak?'是':'否'];});
  const bom='\uFEFF';
  const csv=bom+header.join(',')+'\n'+rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='晚安记录_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function csvEsc(s){if(!s)return '';s=String(s);if(s.includes(',')||s.includes('"')||s.includes('\n'))return '"'+s.replace(/"/g,'""')+'"';return s;}
